<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Gerenciador de Produtos</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>
    <h1>PRODUTOS DO BACKEND</h1>
    <div id="filtros">
        <p>Filtros de pesquisa</p>
        <input type="text" id="nome" placeholder="Nome" value="" />
        <input type="text" id="descricao" placeholder="Descrição" value="" />
        <select id="status">
            <option value=""> - Status - </option>
            <option value="emprestado">Emprestado</option>
            <option value="disponivel">Disponível</option>
            <option value="manutencao">Em Manutenção</option>
        </select>
        <select id="tipo">
            <option value=""> - Tipo - </option>
            <option value="notebook">Notebook</option>
            <option value="projetor">Projetor</option>
        </select>
    </div>

    <div>
        <button id="filtrar" type="button" onclick="getProducts()">Filtrar</button>
        <button id="filtrar" type="button" onclick="cadastrarProduto()">Cadastrar Produto</button>
    </div>

    <div id="campo-edicao-cadastro"></div>

    <div id="produtos">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Tipo</th>
                    <th>Status</th>
                    <th>Descrição</th>
                    <th> </th>
                    <th> </th>
                </tr>
            </thead>
            <tbody id="data"></tbody>
        </table>
    </div>


    <script type="module" src="./main.js"></script>
</body>

</html>
